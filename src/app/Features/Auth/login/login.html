<div class="auth-container">

  <div class="auth-card">

    <div class="left-panel">
      <h1>Welcome Back</h1>
      <p>
        Sign in to access your account.
      </p>
    </div>

    <div class="right-panel">

      <h2>Microsoft Entra Login</h2>

      <p class="subtitle">
        Sign in using your Microsoft organization account.
      </p>

      <button
        type="button"
        class="btn-login"
        (click)="loginWithMicrosoft()">

        Sign in with Microsoft

      </button>

    </div>

  </div>

</div>
